<script>
    (function(){
        // --- STATE ---
        let cookies = 0;
        let totalClicks = 0;
        let clickPower = 1;
        let cps = 0;
        let autoCount = 0;
        let factoryCount = 0;

        const BASE_COST1 = 10;
        const BASE_COST2 = 50;
        const BASE_COST3 = 250;

        let cost1 = BASE_COST1;
        let cost2 = BASE_COST2;
        let cost3 = BASE_COST3;

        // --- OWNER SYSTEM ---
        const OWNER_CODE = "Billyistuff1234";
        let isOwner = false;
        let ownerMenuVisible = false;

        // DOM refs
        const cookieCountEl = document.getElementById('cookieCount');
        const cpsDisplayEl = document.getElementById('cpsDisplay');
        const totalClicksDisplayEl = document.getElementById('totalClicksDisplay');
        const clickBtn = document.getElementById('clickBtn');
        const up1 = document.getElementById('upgrade1');
        const up2 = document.getElementById('upgrade2');
        const up3 = document.getElementById('upgrade3');
        const cost1El = document.getElementById('cost1');
        const cost2El = document.getElementById('cost2');
        const cost3El = document.getElementById('cost3');
        const resetBtn = document.getElementById('resetBtn');
        const saveBtn = document.getElementById('saveBtn');

        // --- helper: update UI ---
        function updateUI() {
            cookieCountEl.textContent = Math.floor(cookies);
            totalClicksDisplayEl.textContent = totalClicks;
            const cpsVal = autoCount * 1 + factoryCount * 5;
            cps = cpsVal;
            cpsDisplayEl.textContent = cpsVal.toFixed(1);

            cost1El.textContent = cost1;
            cost2El.textContent = cost2;
            cost3El.textContent = cost3;

            up1.classList.toggle('disabled', cookies < cost1);
            up2.classList.toggle('disabled', cookies < cost2);
            up3.classList.toggle('disabled', cookies < cost3);
        }

        // --- game logic ---
        function clickCookie() {
            const gain = clickPower;
            cookies += gain;
            totalClicks += 1;
            updateUI();
        }

        function buyUpgrade1() {
            if (cookies < cost1) return false;
            cookies -= cost1;
            clickPower += 1;
            cost1 = Math.floor(cost1 * 1.5) + 2;
            updateUI();
            return true;
        }

        function buyUpgrade2() {
            if (cookies < cost2) return false;
            cookies -= cost2;
            autoCount += 1;
            cost2 = Math.floor(cost2 * 1.6) + 5;
            updateUI();
            return true;
        }

        function buyUpgrade3() {
            if (cookies < cost3) return false;
            cookies -= cost3;
            factoryCount += 1;
            cost3 = Math.floor(cost3 * 1.7) + 15;
            updateUI();
            return true;
        }

        // --- passive CPS tick ---
        function gameTick() {
            if (cps > 0) {
                cookies += cps;
                updateUI();
            }
        }

        // --- save/load (localStorage) ---
        function saveGame() {
            const data = {
                cookies, totalClicks, clickPower, cps,
                autoCount, factoryCount,
                cost1, cost2, cost3,
                isOwner
            };
            try {
                localStorage.setItem('cookieClickerSave', JSON.stringify(data));
            } catch(e) {}
        }

        function loadGame() {
            try {
                const raw = localStorage.getItem('cookieClickerSave');
                if (!raw) return false;
                const data = JSON.parse(raw);
                cookies = data.cookies ?? 0;
                totalClicks = data.totalClicks ?? 0;
                clickPower = data.clickPower ?? 1;
                cps = data.cps ?? 0;
                autoCount = data.autoCount ?? 0;
                factoryCount = data.factoryCount ?? 0;
                cost1 = data.cost1 ?? BASE_COST1;
                cost2 = data.cost2 ?? BASE_COST2;
                cost3 = data.cost3 ?? BASE_COST3;
                isOwner = data.isOwner ?? false;
                updateUI();
                if (isOwner) showOwnerButton();
                return true;
            } catch(e) { return false; }
        }

        function resetGame() {
            if (!confirm('Reset all progress?')) return;
            cookies = 0;
            totalClicks = 0;
            clickPower = 1;
            cps = 0;
            autoCount = 0;
            factoryCount = 0;
            cost1 = BASE_COST1;
            cost2 = BASE_COST2;
            cost3 = BASE_COST3;
            isOwner = false;
            localStorage.removeItem('cookieClickerSave');
            const menu = document.getElementById('ownerMenu');
            if (menu) menu.remove();
            const btn = document.getElementById('ownerBtn');
            if (btn) btn.remove();
            updateUI();
        }

        // --- OWNER SYSTEM FUNCTIONS ---
        function verifyOwnerCode(inputCode) {
            if (inputCode === OWNER_CODE) {
                isOwner = true;
                alert("✅ Owner access granted!");
                showOwnerMenu();
                showOwnerButton();
                saveGame();
                return true;
            } else {
                alert("❌ Invalid owner code.");
                return false;
            }
        }

        function showOwnerButton() {
            let existing = document.getElementById('ownerBtn');
            if (existing) return;
            const btn = document.createElement('button');
            btn.id = 'ownerBtn';
            btn.textContent = '👑 OWNER';
            btn.style.cssText = `
                background: #4a3a1a; border: 2px solid #c9a84c; color: #f5d742;
                padding: 8px 20px; border-radius: 40px; font-weight: 700;
                cursor: pointer; font-size: 1.0rem; letter-spacing: 1px;
                box-shadow: 0 3px 0 #2a1f0a; transition: 0.08s;
                margin-top: 10px; width: 100%;
            `;
            btn.onmouseover = () => { btn.style.background = '#5a4a2a'; };
            btn.onmouseout = () => { btn.style.background = '#4a3a1a'; };
            btn.onclick = () => {
                if (isOwner) {
                    showOwnerMenu();
                } else {
                    const code = prompt("Enter owner code:");
                    if (code !== null) verifyOwnerCode(code);
                }
            };
            const resetArea = document.querySelector('.reset-area');
            resetArea.parentNode.insertBefore(btn, resetArea);
        }

        function showOwnerMenu() {
            if (!isOwner) return;
            ownerMenuVisible = !ownerMenuVisible;
            let menu = document.getElementById('ownerMenu');
            if (menu && !ownerMenuVisible) {
                menu.remove();
                return;
            }
            if (menu) menu.remove();
            menu = document.createElement('div');
            menu.id = 'ownerMenu';
            menu.style.cssText = `
                background: #1a2a3a; border: 2px solid #c9a84c; border-radius: 20px;
                padding: 20px; margin-top: 12px; color: #eedbaa;
                font-family: monospace; text-align: left;
                box-shadow: 0 8px 20px rgba(0,0,0,0.8);
            `;
            menu.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <span style="font-weight:bold; color:#f5d742; font-size:1.2rem;">🔑 OWNER PANEL</span>
                    <button id="closeOwnerMenu" style="background:#3d2a2a; border:1px solid #8f5a5a; color:#f0c8c8; border-radius:30px; padding:2px 14px; cursor:pointer; font-size:1.1rem;">✕</button>
                </div>
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <button class="owner-btn" data-action="add100" style="background:#2a4a3a; border:1px solid #5a9a7a; border-radius:30px; padding:10px; color:#b5e6d0; cursor:pointer; font-weight:600;">+100 cookies</button>
                    <button class="owner-btn" data-action="add1000" style="background:#2a4a3a; border:1px solid #5a9a7a; border-radius:30px; padding:10px; color:#b5e6d0; cursor:pointer; font-weight:600;">+1000 cookies</button>
                    <button class="owner-btn" data-action="setCps10" style="background:#2a4a5a; border:1px solid #5a8aaa; border-radius:30px; padding:10px; color:#b5d6e6; cursor:pointer; font-weight:600;">Set CPS to 10</button>
                    <button class="owner-btn" data-action="setCps50" style="background:#2a4a5a; border:1px solid #5a8aaa; border-radius:30px; padding:10px; color:#b5d6e6; cursor:pointer; font-weight:600;">Set CPS to 50</button>
                    <button class="owner-btn" data-action="maxUpgrades" style="background:#4a3a2a; border:1px solid #aa8a5a; border-radius:30px; padding:10px; color:#e6d6b5; cursor:pointer; font-weight:600;">Max all upgrades</button>
                    <button class="owner-btn" data-action="resetOwner" style="background:#4a2a2a; border:1px solid #aa5a5a; border-radius:30px; padding:10px; color:#e6b5b5; cursor:pointer; font-weight:600;">Reset game (owner)</button>
                </div>
            `;
            const resetArea = document.querySelector('.reset-area');
            resetArea.parentNode.insertBefore(menu, resetArea);

            document.getElementById('closeOwnerMenu').onclick = () => {
                const m = document.getElementById('ownerMenu');
                if (m) m.remove();
                ownerMenuVisible = false;
            };

            document.querySelectorAll('.owner-btn').forEach(btn => {
                btn.onclick = function(e) {
                    e.stopPropagation();
                    const action = this.dataset.action;
                    switch(action) {
                        case 'add100':
                            cookies += 100;
                            updateUI();
                            saveGame();
                            break;
                        case 'add1000':
                            cookies += 1000;
                            updateUI();
                            saveGame();
                            break;
                        case 'setCps10':
                            autoCount = 10;
                            factoryCount = 0;
                            updateUI();
                            saveGame();
                            break;
                        case 'setCps50':
                            autoCount = 0;
                            factoryCount = 10;
                            updateUI();
                            saveGame();
                            break;
                        case 'maxUpgrades':
                            clickPower = 50;
                            autoCount = 20;
                            factoryCount = 20;
                            cost1 = 999999;
                            cost2 = 999999;
                            cost3 = 999999;
                            updateUI();
                            saveGame();
                            break;
                        case 'resetOwner':
                            resetGame();
                            break;
                    }
                };
            });
        }

        // --- event binding ---
        clickBtn.addEventListener('click', clickCookie);

        up1.addEventListener('click', function(e) {
            e.stopPropagation();
            buyUpgrade1();
        });
        up2.addEventListener('click', function(e) {
            e.stopPropagation();
            buyUpgrade2();
        });
        up3.addEventListener('click', function(e) {
            e.stopPropagation();
            buyUpgrade3();
        });

        resetBtn.addEventListener('click', resetGame);
        saveBtn.addEventListener('click', function() {
            saveGame();
            const orig = saveBtn.textContent;
            saveBtn.textContent = '✓ SAVED';
            setTimeout(() => { saveBtn.textContent = orig; }, 800);
        });

        // --- auto-save every 15 seconds ---
        setInterval(saveGame, 15000);

        // --- game loop: tick every 1 second ---
        setInterval(gameTick, 1000);

        // --- load saved data on start ---
        loadGame();

        // --- keyboard shortcut 'c' for click ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'c' || e.key === 'C') {
                e.preventDefault();
                clickCookie();
            }
        });

        // --- show owner button if owner or not ---
        if (!isOwner) {
            // add owner button that prompts for code
            const btn = document.createElement('button');
            btn.id = 'ownerBtn';
            btn.textContent = '👑 OWNER';
            btn.style.cssText = `
                background: #4a3a1a; border: 2px solid #c9a84c; color: #f5d742;
                padding: 8px 20px; border-radius: 40px; font-weight: 700;
                cursor: pointer; font-size: 1.0rem; letter-spacing: 1px;
                box-shadow: 0 3px 0 #2a1f0a; transition: 0.08s;
                margin-top: 10px; width: 100%;
            `;
            btn.onmouseover = () => { btn.style.background = '#5a4a2a'; };
            btn.onmouseout = () => { btn.style.background = '#4a3a1a'; };
            btn.onclick = () => {
                const code = prompt("Enter owner code:");
                if (code !== null) verifyOwnerCode(code);
            };
            const resetArea = document.querySelector('.reset-area');
            resetArea.parentNode.insertBefore(btn, resetArea);
        }

        updateUI();
    })();
</script>
