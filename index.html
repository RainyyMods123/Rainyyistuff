<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shi was made by Rainyyyt</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body {
            background: linear-gradient(145deg, #1e2a3a, #0f1722);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 16px;
        }
        .game-container {
            background: #2a3f5a;
            padding: 40px 50px 50px 50px;
            border-radius: 60px 60px 40px 40px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.7), inset 0 2px 4px rgba(255,255,200,0.1);
            text-align: center;
            max-width: 480px;
            width: 100%;
            border: 1px solid #5b7f9e;
        }
        h1 {
            margin: 0 0 8px 0;
            font-weight: 500;
            font-size: 2.0rem;
            letter-spacing: 2px;
            color: #f5e7c8;
            text-shadow: 0 4px 0 #7a5a3a, 0 6px 12px black;
        }
        .cookie-display {
            background: #1b2938;
            border-radius: 80px;
            padding: 18px 20px;
            margin: 12px 0 20px 0;
            border: 1px solid #6f95b5;
            box-shadow: inset 0 6px 8px rgba(0,0,0,0.6);
        }
        .cookie-count {
            font-size: 3.2rem;
            font-weight: 700;
            color: #ffdd99;
            text-shadow: 0 0 12px #f0b34b;
            font-variant-numeric: tabular-nums;
        }
        .cookie-label {
            color: #b6cddf;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .cookie-btn {
            background: radial-gradient(circle at 30% 30%, #f5c27b, #c77d2a);
            border: none;
            border-radius: 50%;
            width: 160px;
            height: 160px;
            margin: 16px auto 24px auto;
            box-shadow: 0 12px 0 #6b3f12, 0 18px 30px rgba(0,0,0,0.7);
            cursor: pointer;
            transition: 0.06s linear;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5.5rem;
            font-weight: 900;
            color: #4f2b0e;
            text-shadow: 0 4px 0 #b87a3a, 0 6px 6px rgba(0,0,0,0.4);
            border: 2px solid #ebc28b;
        }
        .cookie-btn:active {
            transform: scale(0.92);
            box-shadow: 0 4px 0 #6b3f12, 0 12px 20px rgba(0,0,0,0.8);
        }
        .stats {
            display: flex;
            justify-content: space-between;
            background: #1c2e40;
            padding: 12px 18px;
            border-radius: 40px;
            margin: 12px 0 22px 0;
            border: 1px solid #3f637f;
            color: #d4e6f5;
            font-weight: 500;
            font-size: 1.1rem;
        }
        .stats span { color: #ffcc88; }
        .upgrades {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 6px;
        }
        .upgrade-btn {
            background: #263b4e;
            border: 1px solid #5d83a3;
            border-radius: 50px;
            padding: 14px 18px;
            color: #eaf0f5;
            font-weight: 600;
            font-size: 1.05rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 4px 0 #0d1822;
            background: linear-gradient(145deg, #2d445b, #1a2b3b);
        }
        .upgrade-btn:hover { background: #365571; border-color: #8ab3d4; }
        .upgrade-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #0d1822; }
        .upgrade-btn.disabled {
            opacity: 0.5;
            filter: grayscale(0.7);
            pointer-events: none;
        }
        .upgrade-name { display: flex; align-items: center; gap: 10px; }
        .upgrade-cost { background: #1b2b38; padding: 4px 16px; border-radius: 30px; font-size: 0.95rem; color: #f5c542; }
        .reset-area {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .reset-btn {
            background: #3d2a2a;
            border: 1px solid #8f5a5a;
            color: #f0c8c8;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.08s;
            font-size: 0.9rem;
            box-shadow: 0 3px 0 #2a1717;
        }
        .reset-btn:active { transform: translateY(3px); box-shadow: 0 0px 0 #2a1717; }
        .footer-note {
            margin-top: 20px;
            color: #7799b3;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            border-top: 1px solid #3f5f78;
            padding-top: 16px;
        }
        #cpsDisplay { color: #7fc9ff; font-weight: 700; }
        #ownerBtn {
            background: #4a3a1a;
            border: 2px solid #c9a84c;
            color: #f5d742;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.0rem;
            letter-spacing: 1px;
            box-shadow: 0 3px 0 #2a1f0a;
            transition: 0.08s;
            margin-top: 10px;
            width: 100%;
        }
        #ownerBtn:hover { background: #5a4a2a; }
        #ownerBtn:active { transform: translateY(3px); box-shadow: 0 0px 0 #2a1f0a; }
        #ownerMenu {
            background: #1a2a3a;
            border: 2px solid #c9a84c;
            border-radius: 20px;
            padding: 20px;
            margin-top: 12px;
            color: #eedbaa;
            font-family: monospace;
            text-align: left;
            box-shadow: 0 8px 20px rgba(0,0,0,0.8);
        }
        .owner-btn {
            background: #2a4a3a;
            border: 1px solid #5a9a7a;
            border-radius: 30px;
            padding: 10px;
            color: #b5e6d0;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: 0.08s;
        }
        .owner-btn:hover { filter: brightness(1.2); }
        .owner-btn:active { transform: scale(0.97); }

        /* --- FLOATING DISCORD TEXT --- */
        .floating-discord {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: rgba(88, 101, 242, 0.92);
            color: white;
            padding: 14px 24px;
            border-radius: 50px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), 0 0 0 2px #5865f2 inset;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            z-index: 9999;
            animation: floatDiscord 3s ease-in-out infinite;
            border: none;
            user-select: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .floating-discord:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 40px rgba(88, 101, 242, 0.6), 0 0 0 3px #7289da inset;
            animation-play-state: paused;
        }
        .floating-discord:active {
            transform: scale(0.92);
        }
        .floating-discord .discord-icon {
            display: inline-block;
            margin-right: 10px;
            font-size: 1.4rem;
            vertical-align: middle;
        }
        @keyframes floatDiscord {
            0%   { transform: translateY(0px) rotate(0deg); }
            50%  { transform: translateY(-14px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* --- SECRET STUFF BUTTON --- */
        #secretBtn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(30, 30, 40, 0.9);
            border: 2px solid #ff6b6b;
            color: #ff6b6b;
            padding: 12px 20px;
            border-radius: 40px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-weight: 700;
            font-size: 1.0rem;
            cursor: pointer;
            z-index: 9998;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(255, 107, 107, 0.3);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        #secretBtn:hover {
            transform: scale(1.05);
            background: rgba(255, 107, 107, 0.2);
            box-shadow: 0 4px 30px rgba(255, 107, 107, 0.5);
        }
        #secretBtn:active {
            transform: scale(0.95);
        }

        /* --- SECRET OVERLAY (full screen) --- */
        #secretOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 10, 20, 0.97);
            z-index: 9997;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            overflow-y: auto;
            animation: fadeIn 0.4s ease;
        }
        #secretOverlay.show {
            display: flex;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        #secretOverlay h2 {
            color: #ff6b6b;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .screenshot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            max-width: 1200px;
            width: 100%;
            padding: 20px;
        }

        .screenshot-card {
            background: rgba(30, 30, 50, 0.8);
            border: 1px solid #ff6b6b44;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }
        .screenshot-card:hover {
            transform: translateY(-8px);
            border-color: #ff6b6b;
            box-shadow: 0 8px 40px rgba(255, 107, 107, 0.2);
        }
        .screenshot-card img {
            width: 100%;
            height: auto;
            border-radius: 12px;
            border: 1px solid #444;
            max-height: 200px;
            object-fit: cover;
            background: #1a1a2e;
        }
        .screenshot-card .card-title {
            color: #ddd;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-weight: 600;
            margin-top: 12px;
            font-size: 1.0rem;
        }
        .screenshot-card .card-link {
            color: #ff6b6b;
            font-size: 0.8rem;
            word-break: break-all;
            display: block;
            margin-top: 6px;
            font-family: monospace;
        }

        #secretBackBtn {
            margin-top: 30px;
            background: #ff6b6b;
            border: none;
            color: #fff;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(255, 107, 107, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #secretBackBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.6);
        }
        #secretBackBtn:active {
            transform: scale(0.95);
        }

        @media (max-width: 600px) {
            .floating-discord {
                bottom: 16px;
                right: 16px;
                padding: 10px 16px;
                font-size: 0.85rem;
                border-radius: 40px;
            }
            .floating-discord .discord-icon {
                font-size: 1.0rem;
                margin-right: 6px;
            }
            #secretBtn {
                bottom: 16px;
                left: 16px;
                padding: 8px 14px;
                font-size: 0.75rem;
            }
            #secretOverlay h2 {
                font-size: 1.8rem;
            }
            .screenshot-grid {
                grid-template-columns: 1fr;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<!-- SECRET STUFF BUTTON (bottom left) -->
<button id="secretBtn">🔒 SECRET STUFF</button>

<!-- SECRET OVERLAY -->
<div id="secretOverlay">
    <h2>📸 SECRET SCREENSHOTS</h2>
    <div class="screenshot-grid" id="screenshotGrid">
        <!-- Cards will be generated by JavaScript -->
    </div>
    <button id="secretBackBtn">⬅ BACK TO GAME</button>
</div>

<div class="game-container">
    <h1>🍪 CLICKER</h1>

    <div class="cookie-display">
        <div class="cookie-count" id="cookieCount">0</div>
        <div class="cookie-label">cookies</div>
    </div>

    <button class="cookie-btn" id="clickBtn">🍪</button>

    <div class="stats">
        <div>⚡ CPS <span id="cpsDisplay">0.0</span></div>
        <div>🏆 total <span id="totalClicksDisplay">0</span></div>
    </div>

    <div class="upgrades">
        <div class="upgrade-btn" id="upgrade1">
            <span class="upgrade-name">👆 Click Power +1</span>
            <span class="upgrade-cost" id="cost1">10</span>
        </div>
        <div class="upgrade-btn" id="upgrade2">
            <span class="upgrade-name">🤖 Auto-clicker x1</span>
            <span class="upgrade-cost" id="cost2">50</span>
        </div>
        <div class="upgrade-btn" id="upgrade3">
            <span class="upgrade-name">🏭 Factory +5 CPS</span>
            <span class="upgrade-cost" id="cost3">250</span>
        </div>
    </div>

    <button id="ownerBtn">👑 OWNER</button>

    <div class="reset-area">
        <button class="reset-btn" id="resetBtn">↻ RESET</button>
        <button class="reset-btn" id="saveBtn">💾 SAVE</button>
    </div>
    <div class="footer-note">☁️ Cloudflare + GitHub ready · auto‑save every 15s</div>
</div>

<!-- FLOATING DISCORD BUTTON -->
<div class="floating-discord" id="discordFloat" title="Click to copy Discord username">
    <span class="discord-icon">💬</span>
    Add me on discord rainyy.mods
</div>

<script>
    (function(){
        // --- STATE ---
        let cookies = 0;
        let totalClicks = 0;
        let clickPower = 1;
        let cps = 0;
        let autoCount = 0;
        let factoryCount = 0;

        const BASE_COST1 = 10;
        const BASE_COST2 = 50;
        const BASE_COST3 = 250;

        let cost1 = BASE_COST1;
        let cost2 = BASE_COST2;
        let cost3 = BASE_COST3;

        // --- OWNER SYSTEM ---
        const OWNER_CODE = "Billyistuff1234";
        let isOwner = false;
        let ownerMenuVisible = false;

        // DOM refs
        const cookieCountEl = document.getElementById('cookieCount');
        const cpsDisplayEl = document.getElementById('cpsDisplay');
        const totalClicksDisplayEl = document.getElementById('totalClicksDisplay');
        const clickBtn = document.getElementById('clickBtn');
        const up1 = document.getElementById('upgrade1');
        const up2 = document.getElementById('upgrade2');
        const up3 = document.getElementById('upgrade3');
        const cost1El = document.getElementById('cost1');
        const cost2El = document.getElementById('cost2');
        const cost3El = document.getElementById('cost3');
        const resetBtn = document.getElementById('resetBtn');
        const saveBtn = document.getElementById('saveBtn');
        const ownerBtn = document.getElementById('ownerBtn');

        // --- helper: update UI ---
        function updateUI() {
            cookieCountEl.textContent = Math.floor(cookies);
            totalClicksDisplayEl.textContent = totalClicks;
            const cpsVal = autoCount * 1 + factoryCount * 5;
            cps = cpsVal;
            cpsDisplayEl.textContent = cpsVal.toFixed(1);

            cost1El.textContent = cost1;
            cost2El.textContent = cost2;
            cost3El.textContent = cost3;

            up1.classList.toggle('disabled', cookies < cost1);
            up2.classList.toggle('disabled', cookies < cost2);
            up3.classList.toggle('disabled', cookies < cost3);
        }

        // --- game logic ---
        function clickCookie() {
            const gain = clickPower;
            cookies += gain;
            totalClicks += 1;
            updateUI();
        }

        function buyUpgrade1() {
            if (cookies < cost1) return false;
            cookies -= cost1;
            clickPower += 1;
            cost1 = Math.floor(cost1 * 1.5) + 2;
            updateUI();
            return true;
        }

        function buyUpgrade2() {
            if (cookies < cost2) return false;
            cookies -= cost2;
            autoCount += 1;
            cost2 = Math.floor(cost2 * 1.6) + 5;
            updateUI();
            return true;
        }

        function buyUpgrade3() {
            if (cookies < cost3) return false;
            cookies -= cost3;
            factoryCount += 1;
            cost3 = Math.floor(cost3 * 1.7) + 15;
            updateUI();
            return true;
        }

        // --- passive CPS tick ---
        function gameTick() {
            if (cps > 0) {
                cookies += cps;
                updateUI();
            }
        }

        // --- save/load (localStorage) ---
        function saveGame() {
            const data = {
                cookies, totalClicks, clickPower, cps,
                autoCount, factoryCount,
                cost1, cost2, cost3,
                isOwner
            };
            try {
                localStorage.setItem('cookieClickerSave', JSON.stringify(data));
            } catch(e) {}
        }

        function loadGame() {
            try {
                const raw = localStorage.getItem('cookieClickerSave');
                if (!raw) return false;
                const data = JSON.parse(raw);
                cookies = data.cookies ?? 0;
                totalClicks = data.totalClicks ?? 0;
                clickPower = data.clickPower ?? 1;
                cps = data.cps ?? 0;
                autoCount = data.autoCount ?? 0;
                factoryCount = data.factoryCount ?? 0;
                cost1 = data.cost1 ?? BASE_COST1;
                cost2 = data.cost2 ?? BASE_COST2;
                cost3 = data.cost3 ?? BASE_COST3;
                isOwner = data.isOwner ?? false;
                updateUI();
                if (isOwner) {
                    ownerBtn.textContent = '👑 OWNER (active)';
                    ownerBtn.style.borderColor = '#7aff7a';
                }
                return true;
            } catch(e) { return false; }
        }

        function resetGame() {
            if (!confirm('Reset all progress?')) return;
            cookies = 0;
            totalClicks = 0;
            clickPower = 1;
            cps = 0;
            autoCount = 0;
            factoryCount = 0;
            cost1 = BASE_COST1;
            cost2 = BASE_COST2;
            cost3 = BASE_COST3;
            isOwner = false;
            localStorage.removeItem('cookieClickerSave');
            const menu = document.getElementById('ownerMenu');
            if (menu) menu.remove();
            ownerBtn.textContent = '👑 OWNER';
            ownerBtn.style.borderColor = '#c9a84c';
            ownerMenuVisible = false;
            updateUI();
        }

        // --- OWNER SYSTEM FUNCTIONS ---
        function verifyOwnerCode(inputCode) {
            if (inputCode === OWNER_CODE) {
                isOwner = true;
                alert("✅ Owner access granted!");
                ownerBtn.textContent = '👑 OWNER (active)';
                ownerBtn.style.borderColor = '#7aff7a';
                showOwnerMenu();
                saveGame();
                return true;
            } else {
                alert("❌ Invalid owner code.");
                return false;
            }
        }

        function showOwnerMenu() {
            if (!isOwner) return;
            ownerMenuVisible = !ownerMenuVisible;
            let menu = document.getElementById('ownerMenu');
            if (menu && !ownerMenuVisible) {
                menu.remove();
                return;
            }
            if (menu) menu.remove();

            menu = document.createElement('div');
            menu.id = 'ownerMenu';
            menu.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <span style="font-weight:bold; color:#f5d742; font-size:1.2rem;">🔑 OWNER PANEL</span>
                    <button id="closeOwnerMenu" style="background:#3d2a2a; border:1px solid #8f5a5a; color:#f0c8c8; border-radius:30px; padding:2px 14px; cursor:pointer; font-size:1.1rem;">✕</button>
                </div>
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <button class="owner-btn" data-action="add100">+100 cookies</button>
                    <button class="owner-btn" data-action="add1000">+1000 cookies</button>
                    <button class="owner-btn" data-action="add10000">+10,000 cookies</button>
                    <button class="owner-btn" data-action="add1B">+1,000,000,000 cookies</button>
                    <button class="owner-btn" data-action="setCps10">Set CPS to 10</button>
                    <button class="owner-btn" data-action="setCps50">Set CPS to 50</button>
                    <button class="owner-btn" data-action="setCps100">Set CPS to 100</button>
                    <button class="owner-btn" data-action="setCps1B">🚀 1 BILLION CPS</button>
                    <button class="owner-btn" data-action="maxUpgrades">Max all upgrades</button>
                    <button class="owner-btn" data-action="resetOwner" style="border-color:#aa5a5a; color:#e6b5b5;">Reset game (owner)</button>
                </div>
            `;
            const resetArea = document.querySelector('.reset-area');
            resetArea.parentNode.insertBefore(menu, resetArea);

            document.getElementById('closeOwnerMenu').onclick = () => {
                const m = document.getElementById('ownerMenu');
                if (m) m.remove();
                ownerMenuVisible = false;
            };

            document.querySelectorAll('.owner-btn').forEach(btn => {
                btn.onclick = function(e) {
                    e.stopPropagation();
                    const action = this.dataset.action;
                    switch(action) {
                        case 'add100':
                            cookies += 100;
                            updateUI();
                            saveGame();
                            break;
                        case 'add1000':
                            cookies += 1000;
                            updateUI();
                            saveGame();
                            break;
                        case 'add10000':
                            cookies += 10000;
                            updateUI();
                            saveGame();
                            break;
                        case 'add1B':
                            cookies += 1000000000;
                            updateUI();
                            saveGame();
                            break;
                        case 'setCps10':
                            autoCount = 10;
                            factoryCount = 0;
                            updateUI();
                            saveGame();
                            break;
                        case 'setCps50':
                            autoCount = 0;
                            factoryCount = 10;
                            updateUI();
                            saveGame();
                            break;
                        case 'setCps100':
                            autoCount = 0;
                            factoryCount = 20;
                            updateUI();
                            saveGame();
                            break;
                        case 'setCps1B':
                            autoCount = 0;
                            factoryCount = 200000000;
                            updateUI();
                            saveGame();
                            break;
                        case 'maxUpgrades':
                            clickPower = 50;
                            autoCount = 20;
                            factoryCount = 20;
                            cost1 = 999999;
                            cost2 = 999999;
                            cost3 = 999999;
                            updateUI();
                            saveGame();
                            break;
                        case 'resetOwner':
                            resetGame();
                            break;
                    }
                };
            });
        }

        // --- SECRET STUFF SYSTEM ---
        const secretBtn = document.getElementById('secretBtn');
        const secretOverlay = document.getElementById('secretOverlay');
        const secretBackBtn = document.getElementById('secretBackBtn');
        const screenshotGrid = document.getElementById('screenshotGrid');

        // --- CONFIGURE YOUR SCREENSHOT LINKS HERE ---
        const screenshotData = [
            {
                title: "Screenshot 1",
                imageUrl: "https://via.placeholder.com/400x200/1a1a2e/ff6b6b?text=Screenshot+1",
                link: "https://example.com/screenshot1.png"
            },
            {
                title: "Screenshot 2",
                imageUrl: "https://via.placeholder.com/400x200/1a1a2e/ff6b6b?text=Screenshot+2",
                link: "https://example.com/screenshot2.png"
            },
            {
                title: "Screenshot 3",
                imageUrl: "https://via.placeholder.com/400x200/1a1a2e/ff6b6b?text=Screenshot+3",
                link: "https://example.com/screenshot3.png"
            },
            {
                title: "Screenshot 4",
                imageUrl: "https://via.placeholder.com/400x200/1a1a2e/ff6b6b?text=Screenshot+4",
                link: "https://example.com/screenshot4.png"
            },
            {
                title: "Screenshot 5",
                imageUrl: "https://via.placeholder.com/400x200/1a1a2e/ff6b6b?text=Screenshot+5",
                link: "https://example.com/screenshot5.png"
            }
        ];

        // --- Generate screenshot cards ---
        function renderScreenshots() {
            screenshotGrid.innerHTML = '';
            screenshotData.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'screenshot-card';
                card.innerHTML = `
                    <img src="${item.imageUrl}" alt="${item.title}" loading="lazy" />
                    <div class="card-title">📷 ${item.title}</div>
                    <div class="card-link">🔗 ${item.link}</div>
                `;
                card.addEventListener('click', () => {
                    window.open(item.link, '_blank');
                });
                screenshotGrid.appendChild(card);
            });
        }

        // --- Toggle secret overlay ---
        function showSecretStuff() {
            // Hide everything except the floating discord button and the secret button itself
            const gameContainer = document.querySelector('.game-container');
            const footerNote = document.querySelector('.footer-note');
            const ownerBtn = document.getElementById('ownerBtn');
            const resetArea = document.querySelector('.reset-area');
            const upgrades = document.querySelector('.upgrades');
            const stats = document.querySelector('.stats');
            const cookieDisplay = document.querySelector('.cookie-display');
            const h1 = document.querySelector('h1');
            const clickBtn = document.getElementById('clickBtn');

            if (gameContainer) gameContainer.style.display = 'none';
            if (footerNote) footerNote.style.display = 'none';
            if (ownerBtn) ownerBtn.style.display = 'none';
            if (resetArea) resetArea.style.display = 'none';
            if (upgrades) upgrades.style.display = 'none';
            if (stats) stats.style.display = 'none';
            if (cookieDisplay) cookieDisplay.style.display = 'none';
            if (h1) h1.style.display = 'none';
            if (clickBtn) clickBtn.style.display = 'none';

            const ownerMenu = document.getElementById('ownerMenu');
            if (ownerMenu) ownerMenu.style.display = 'none';

            secretOverlay.classList.add('show');
            renderScreenshots();
        }

        function hideSecretStuff() {
            const gameContainer = document.querySelector('.game-container');
            const footerNote = document.querySelector('.footer-note');
            const ownerBtn = document.getElementById('ownerBtn');
            const resetArea = document.querySelector('.reset-area');
            const upgrades = document.querySelector('.upgrades');
            const stats = document.querySelector('.stats');
            const cookieDisplay = document.querySelector('.cookie-display');
            const h1 = document.querySelector('h1');
            const clickBtn = document.getElementById('clickBtn');

            if (gameContainer) gameContainer.style.display = 'block';
            if (footerNote) footerNote.style.display = 'block';
            if (ownerBtn) ownerBtn.style.display = 'block';
            if (resetArea) resetArea.style.display = 'flex';
            if (upgrades) upgrades.style.display = 'flex';
            if (stats) stats.style.display = 'flex';
            if (cookieDisplay) cookieDisplay.style.display = 'block';
            if (h1) h1.style.display = 'block';
            if (clickBtn) clickBtn.style.display = 'flex';

            const ownerMenu = document.getElementById('ownerMenu');
            if (ownerMenu) ownerMenu.style.display = 'block';

            secretOverlay.classList.remove('show');
        }

        // --- Event listeners ---
        secretBtn.addEventListener('click', showSecretStuff);
        secretBackBtn.addEventListener('click', hideSecretStuff);

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && secretOverlay.classList.contains('show')) {
                hideSecretStuff();
            }
        });

        // --- event binding ---
        clickBtn.addEventListener('click', clickCookie);

        up1.addEventListener('click', function(e) {
            e.stopPropagation();
            buyUpgrade1();
        });
        up2.addEventListener('click', function(e) {
            e.stopPropagation();
            buyUpgrade2();
        });
        up3.addEventListener('click', function(e) {
            e.stopPropagation();
            buyUpgrade3();
        });

        resetBtn.addEventListener('click', resetGame);
        saveBtn.addEventListener('click', function() {
            saveGame();
            const orig = saveBtn.textContent;
            saveBtn.textContent = '✓ SAVED';
            setTimeout(() => { saveBtn.textContent = orig; }, 800);
        });

        ownerBtn.addEventListener('click', function() {
            if (isOwner) {
                showOwnerMenu();
            } else {
                const code = prompt("Enter owner code:");
                if (code !== null) verifyOwnerCode(code);
            }
        });

        // --- FLOATING DISCORD COPY FUNCTION ---
        const discordFloat = document.getElementById('discordFloat');
        if (discordFloat) {
            discordFloat.addEventListener('click', function(e) {
                e.stopPropagation();
                const username = 'rainyy.mods';
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(username).then(() => {
                        const original = this.innerHTML;
                        this.innerHTML = '✅ Copied!';
                        this.style.background = '#3ba55d';
                        this.style.animation = 'none';
                        setTimeout(() => {
                            this.innerHTML = original;
                            this.style.background = 'rgba(88, 101, 242, 0.92)';
                            this.style.animation = 'floatDiscord 3s ease-in-out infinite';
                        }, 1800);
                    }).catch(() => {
                        prompt('Copy this username:', username);
                    });
                } else {
                    prompt('Copy this username:', username);
                }
            });
        }

        // --- auto-save every 15 seconds ---
        setInterval(saveGame, 15000);

        // --- game loop: tick every 3 seconds ---
        setInterval(gameTick, 3000);

        // --- load saved data on start ---
        loadGame();

        // --- keyboard shortcut 'c' for click ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'c' || e.key === 'C') {
                e.preventDefault();
                clickCookie();
            }
        });

        updateUI();
    })();
</script>
</body>
</html>
